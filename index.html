<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀：激战</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (用于在浏览器中解析 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #0c0a09; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button, .cursor-pointer { touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 解构 React 钩子
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        /**
         * 修复方案：自定义 SVG 图标组件
         * 修复了相邻 JSX 元素未包裹 Fragment 的 SyntaxError
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                'sword': <path d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6m-3 7l4-4" />,
                'shield': <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                'heart': <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />,
                'zap': <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                'x-circle': (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="m15 9-6 6" />
                        <path d="m9 9 6 6" />
                    </React.Fragment>
                ),
                'flame': <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />,
                'cpu': (
                    <React.Fragment>
                        <rect x="4" y="4" width="16" height="16" rx="2" />
                        <path d="M9 9h6v6H9z" />
                        <path d="M15 2v2" /><path d="M15 20v2" />
                        <path d="M2 15h2" /><path d="M2 9h2" />
                        <path d="M20 15h2" /><path d="M20 9h2" />
                        <path d="M9 2v2" /><path d="M9 20v2" />
                    </React.Fragment>
                ),
                'message-square': <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                'scroll-text': (
                    <React.Fragment>
                        <path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4" />
                        <path d="M19 17V5a2 2 0 0 0-2-2H4" />
                        <path d="M15 8h-5" /><path d="M15 12h-5" />
                    </React.Fragment>
                ),
                'brain-circuit': (
                    <React.Fragment>
                        <path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.96.06" />
                        <path d="M16 14v2a2 2 0 0 1-2 2h-4" />
                        <path d="M22 13a5 5 0 0 0-5-5" />
                        <circle cx="17" cy="13" r="1" />
                        <path d="M12 2v2" /><path d="M12 20v2" />
                        <path d="M20 12h2" /><path d="M2 12h2" />
                    </React.Fragment>
                ),
                'shield-alert': (
                    <React.Fragment>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                        <path d="M12 8v4" /><path d="M12 16h.01" />
                    </React.Fragment>
                )
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 游戏配置数据 ---
        const CARD_CONFIG = [
            { name: '杀', type: '基本牌', color: 'red', key: 'sha', desc: '造成1点伤害', weight: 15, icon: 'sword' }, 
            { name: '闪', type: '基本牌', color: 'blue', key: 'shan', desc: '抵消一张杀', weight: 8, icon: 'shield' },  
            { name: '桃', type: '基本牌', color: 'pink', key: 'tao', desc: '回复1点体力', weight: 5, icon: 'heart' },
            { name: '顺手牵羊', type: '锦囊牌', color: 'yellow', key: 'shun', desc: '夺取对手一张牌', weight: 4, icon: 'zap' },
            { name: '过河拆桥', type: '锦囊牌', color: 'gray', key: 'chai', desc: '弃置对手一张牌', weight: 3, icon: 'x-circle' },
            { name: '决斗', type: '锦囊牌', color: 'red', key: 'juedou', desc: '与对手轮流出杀', weight: 3, icon: 'flame' },
        ];

        const WEIGHTED_POOL = [];
        CARD_CONFIG.forEach(card => {
            for (let i = 0; i < card.weight; i++) {
                WEIGHTED_POOL.push(card);
            }
        });

        const HEROES = [
            { id: 0, name: '刘备', maxHp: 4, skill: '仁德', color: 'bg-green-900' },
            { id: 1, name: '曹操', maxHp: 4, skill: '奸雄', color: 'bg-blue-900' },
            { id: 2, name: '孙权', maxHp: 4, skill: '制衡', color: 'bg-red-900' },
            { id: 3, name: '袁绍', maxHp: 4, skill: '乱击', color: 'bg-yellow-900' },
        ];

        const App = () => {
            const [gameState, setGameState] = useState('menu'); 
            const [players, setPlayers] = useState([]);
            const [turnIdx, setTurnIdx] = useState(0);
            const [logs, setLogs] = useState(["节奏加快，战火重燃！"]);
            const [selectedCardIdx, setSelectedCardIdx] = useState(null);
            const [isSelectingTarget, setIsSelectingTarget] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 8));

            const getRandomCard = () => {
                const card = WEIGHTED_POOL[Math.floor(Math.random() * WEIGHTED_POOL.length)];
                return { ...card, uid: Math.random().toString(36).substr(2, 9) };
            };

            const drawCards = (pIdx, count) => {
                setPlayers(prev => {
                    const next = [...prev];
                    if (!next[pIdx] || next[pIdx].hp <= 0) return prev;
                    const newCards = Array(count).fill(0).map(getRandomCard);
                    next[pIdx].hand = [...next[pIdx].hand, ...newCards];
                    return next;
                });
            };

            const startGame = (heroIdx) => {
                const initPlayers = [
                    { id: 0, name: '你', hero: HEROES[heroIdx], hp: 4, maxHp: 4, hand: Array(4).fill(0).map(getRandomCard), isAi: false },
                    { id: 1, name: '左路先锋', hero: HEROES[1], hp: 4, maxHp: 4, hand: Array(4).fill(0).map(getRandomCard), isAi: true },
                    { id: 2, name: '中军大将', hero: HEROES[2], hp: 4, maxHp: 4, hand: Array(4).fill(0).map(getRandomCard), isAi: true },
                    { id: 3, name: '右翼统领', hero: HEROES[3], hp: 4, maxHp: 4, hand: Array(4).fill(0).map(getRandomCard), isAi: true },
                ];
                setPlayers(initPlayers);
                setGameState('playing');
                setTurnIdx(0);
                drawCards(0, 2);
                addLog("你的回合，战事开启。");
            };

            const nextTurn = useCallback(() => {
                setTurnIdx(prev => {
                    let next = (prev + 1) % 4;
                    let attempts = 0;
                    while (players[next]?.hp <= 0 && attempts < 4) {
                        next = (next + 1) % 4;
                        attempts++;
                    }
                    if (players[next]?.hp > 0) {
                        addLog(`${players[next].name} 的回合开始`);
                        drawCards(next, 2);
                        return next;
                    }
                    return prev;
                });
                setSelectedCardIdx(null);
                setIsSelectingTarget(false);
                setPendingAction(null);
            }, [players]);

            const resolveEffect = (action, counterIdx = null) => {
                const { type, source, target } = action;
                const newPlayers = [...players];
                const sP = newPlayers[source];
                const tP = newPlayers[target];

                if (counterIdx !== null) {
                    addLog(`${tP.name} 打出【闪】化解。`);
                    tP.hand.splice(counterIdx, 1);
                } else {
                    if (type === 'sha' || type === 'juedou') {
                        tP.hp = Math.max(0, tP.hp - 1);
                        addLog(`${tP.name} 受到1点伤害！`);
                    } else if (type === 'tao') {
                        sP.hp = Math.min(sP.maxHp, sP.hp + 1);
                        addLog(`${sP.name} 恢复了体力。`);
                    } else if (type === 'shun' && tP.hand.length > 0) {
                        const card = tP.hand.splice(Math.floor(Math.random()*tP.hand.length),1)[0];
                        sP.hand.push(card);
                        addLog(`${sP.name} 顺走了一张牌。`);
                    } else if (type === 'chai' && tP.hand.length > 0) {
                        tP.hand.splice(Math.floor(Math.random()*tP.hand.length),1);
                        addLog(`${sP.name} 拆掉了一张牌。`);
                    }
                }
                setPlayers(newPlayers);
                setPendingAction(null);
                if (turnIdx !== 0) setTimeout(nextTurn, 800);
            };

            const onCardClick = (idx) => {
                if (turnIdx !== 0 || pendingAction) return;
                const card = players[0].hand[idx];
                if (card.key === 'tao') {
                    if (players[0].hp < players[0].maxHp) {
                        resolveEffect({ type: 'tao', source: 0, target: 0 });
                        setPlayers(p => { const n=[...p]; n[0].hand.splice(idx,1); return n; });
                    }
                } else {
                    setSelectedCardIdx(idx);
                    setIsSelectingTarget(true);
                }
            };

            const onTargetSelect = (tIdx) => {
                if (!isSelectingTarget || tIdx === 0 || players[tIdx].hp <= 0) return;
                const card = players[0].hand[selectedCardIdx];
                const action = { type: card.key, source: 0, target: tIdx };
                setPlayers(p => { const n=[...p]; n[0].hand.splice(selectedCardIdx,1); return n; });
                
                if (card.key === 'sha') {
                    setPendingAction(action);
                    setTimeout(() => {
                        const shanIdx = players[tIdx].hand.findIndex(c => c.key === 'shan');
                        resolveEffect(action, shanIdx !== -1 ? shanIdx : null);
                    }, 800);
                } else {
                    resolveEffect(action);
                }
                setIsSelectingTarget(false);
                setSelectedCardIdx(null);
            };

            useEffect(() => {
                if (gameState === 'playing' && turnIdx !== 0 && !pendingAction) {
                    const timer = setTimeout(() => {
                        const me = players[turnIdx];
                        if (!me || me.hp <= 0) { nextTurn(); return; }
                        const shaIdx = me.hand.findIndex(c => c.key === 'sha');
                        if (shaIdx !== -1) {
                            const action = { type: 'sha', source: turnIdx, target: 0 };
                            setPlayers(p => { const n=[...p]; n[turnIdx].hand.splice(shaIdx,1); return n; });
                            setPendingAction(action);
                            setTimeout(() => {
                                const shanIdx = players[0].hand.findIndex(c => c.key === 'shan');
                                resolveEffect(action, shanIdx !== -1 ? shanIdx : null);
                            }, 800);
                        } else {
                            nextTurn();
                        }
                    }, 1500);
                    return () => clearTimeout(timer);
                }
            }, [turnIdx, pendingAction, gameState, players, nextTurn]);

            if (gameState === 'menu') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center text-white bg-stone-950 p-6">
                        <div className="flex items-center gap-4 mb-12">
                            <Icon name="flame" size={60} className="text-red-600 animate-pulse" />
                            <h1 className="text-6xl font-black text-yellow-600 tracking-tighter italic">三国杀：激战</h1>
                        </div>
                        <div className="grid grid-cols-2 gap-6 max-w-xl w-full">
                            {HEROES.map((h, i) => (
                                <button key={h.id} onClick={() => startGame(i)} className={`${h.color} p-8 rounded-2xl border-2 border-white/5 hover:border-yellow-500 hover:scale-105 transition-all shadow-2xl text-left`}>
                                    <div className="text-3xl font-bold">{h.name}</div>
                                    <div className="text-sm opacity-60 mt-2 font-sans tracking-widest">技能：{h.skill}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-stone-900 text-white flex flex-col overflow-hidden relative">
                    {/* 对手区域 */}
                    <div className="h-[30%] bg-black/40 border-b border-white/5 flex justify-around items-center p-4">
                        {players.slice(1).map(p => (
                            <div key={p.id} onClick={() => onTargetSelect(p.id)} className={`flex flex-col items-center p-4 rounded-3xl border-2 transition-all w-36 ${turnIdx === p.id ? 'border-red-500 bg-red-500/10 scale-110 shadow-lg' : 'border-transparent'} ${p.hp <= 0 ? 'grayscale opacity-30 pointer-events-none' : 'cursor-pointer'}`}>
                                <div className="w-16 h-16 bg-stone-800 rounded-full flex items-center justify-center mb-2 border border-white/10 shadow-inner">
                                    <Icon name="cpu" size={32} className={turnIdx === p.id ? "text-red-500" : "text-stone-500"} />
                                </div>
                                <div className="font-bold text-sm tracking-widest">{p.name}</div>
                                <div className="flex gap-1 mt-1">
                                    {Array(p.maxHp).fill(0).map((_, i) => (
                                        <div key={i} className={`w-2 h-2 rounded-full ${i < p.hp ? 'bg-red-600' : 'bg-stone-800'}`}></div>
                                    ))}
                                </div>
                                <div className="text-[10px] text-stone-500 mt-1 uppercase font-sans tracking-tighter">Cards: {p.hand.length}</div>
                            </div>
                        ))}
                    </div>

                    {/* 日志区域 */}
                    <div className="h-[35%] flex gap-4 p-4">
                        <div className="flex-1 bg-black/30 rounded-3xl border border-white/5 p-5 overflow-y-auto no-scrollbar shadow-inner">
                            <div className="flex items-center gap-2 mb-4 opacity-40">
                                <Icon name="message-square" size={14} />
                                <span className="text-[10px] font-bold uppercase tracking-widest">战报</span>
                            </div>
                            {logs.map((log, i) => (
                                <div key={i} className={`text-sm mb-2 pb-2 border-b border-white/5 last:border-0 ${i === 0 ? 'text-red-400 font-bold' : 'text-stone-600'}`}>
                                    {log}
                                </div>
                            ))}
                        </div>
                        <div className="w-64 bg-indigo-950/20 border border-indigo-500/20 rounded-3xl p-5 flex flex-col justify-between">
                            <div>
                                <div className="text-[10px] font-bold text-indigo-400 mb-3 tracking-widest flex items-center gap-2">
                                    <Icon name="scroll-text" size={14} /> 军师建议
                                </div>
                                <p className="text-xs italic leading-relaxed text-indigo-100/80">“兵者，诡道也。审时度势，方能百战不殆。”</p>
                            </div>
                            <Icon name="brain-circuit" className="text-indigo-500/20 self-end" size={40} />
                        </div>
                    </div>

                    {/* 玩家区域 */}
                    <div className="h-[35%] bg-stone-950/80 border-t border-white/10 relative pt-12 flex flex-col">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-stone-800 border border-white/10 px-6 py-2 rounded-full shadow-2xl flex items-center gap-8 backdrop-blur-md">
                            <div className="flex items-center gap-3">
                                <Icon name="heart" size={16} className="text-red-600 fill-red-600" />
                                <span className="text-sm font-bold tracking-widest">{players[0]?.hp} / {players[0]?.maxHp}</span>
                            </div>
                            {turnIdx === 0 && (
                                <div className="flex items-center gap-4">
                                    <span className="text-[10px] text-yellow-500 font-bold animate-pulse">请出牌</span>
                                    <button onClick={nextTurn} className="bg-red-800 hover:bg-red-700 text-white text-[10px] font-bold px-4 py-1.5 rounded-lg transition-colors">结束回合</button>
                                </div>
                            )}
                        </div>

                        <div className="flex-1 flex justify-center items-end gap-2 px-10 pb-6 overflow-x-auto no-scrollbar">
                            {players[0]?.hand.map((card, i) => (
                                <div 
                                    key={card.uid} 
                                    onClick={() => onCardClick(i)}
                                    className={`w-28 h-40 bg-stone-100 rounded-xl p-3 flex flex-col justify-between cursor-pointer transition-all shadow-2xl flex-shrink-0 relative group
                                    ${selectedCardIdx === i ? '-translate-y-12 ring-4 ring-yellow-500' : 'hover:-translate-y-6 hover:z-10'}
                                    ${turnIdx !== 0 ? 'opacity-50 grayscale' : ''}`}
                                >
                                    <div className="text-stone-900">
                                        <div className="font-black text-2xl leading-none">{card.name}</div>
                                        <div className="text-[9px] mt-1 opacity-60 font-sans">{card.type}</div>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <Icon name={card.icon} size={20} className="text-stone-400" />
                                        <div className="text-[10px] text-stone-300 font-sans font-bold"># {i+1}</div>
                                    </div>
                                    <div className="absolute inset-0 bg-black/80 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity p-3 flex items-center justify-center text-center">
                                        <p className="text-[10px] text-white leading-relaxed">{card.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 被攻击时的弹窗 */}
                    {pendingAction && pendingAction.target === 0 && (
                        <div className="absolute inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center">
                            <div className="bg-stone-900 border-2 border-red-500 p-8 rounded-3xl shadow-2xl text-center max-w-sm">
                                <Icon name="shield-alert" size={48} className="text-red-500 mx-auto mb-4 animate-bounce" />
                                <h2 className="text-xl font-bold mb-2">敌军突袭！</h2>
                                <p className="text-xs text-stone-400 mb-6">对手向你出【杀】，是否使用【闪】抵挡？</p>
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => {
                                            const sIdx = players[0].hand.findIndex(c => c.key === 'shan');
                                            if (sIdx !== -1) resolveEffect(pendingAction, sIdx);
                                        }}
                                        disabled={players[0].hand.findIndex(c => c.key === 'shan') === -1}
                                        className="flex-1 bg-blue-700 hover:bg-blue-600 disabled:opacity-30 py-3 rounded-xl font-bold text-sm"
                                    >打出闪</button>
                                    <button onClick={() => resolveEffect(pendingAction)} className="flex-1 bg-stone-700 hover:bg-stone-600 py-3 rounded-xl font-bold text-sm">强行承受</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
